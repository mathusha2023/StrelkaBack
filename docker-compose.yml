name: "Backend"

services:
  minio:
    container_name: minio
    image: minio/minio
    restart: unless-stopped
    entrypoint: sh
    command: >
      -c 'mkdir -p /data/bucket
      && minio server /data'
#    ports:
#      - "${S3_PORT}:${S3_PORT}"
#      - "${S3_ADMIN_PORT}:${S3_ADMIN_PORT}"
#    expose:
#      - ${S3_PORT}
#      - ${S3_ADMIN_PORT}
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
      MINIO_ADDRESS: ":${S3_PORT}"
      MINIO_CONSOLE_ADDRESS: ":${S3_ADMIN_PORT}"
    healthcheck:
      test: [ "CMD", "sh", "-c", "mc alias set myminio http://localhost:${S3_PORT} ${S3_ACCESS_KEY} ${S3_SECRET_KEY} && mc ls myminio" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - minio_data:/data
    networks:
      - backend

  database:
    hostname: ${POSTGRES_HOST}
    container_name: database
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_INITDB_ARGS: "--locale=C.UTF-8"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
#    ports:
#      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
#    command:
#      - -p
#      - "${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-postgis.sql:/docker-entrypoint-initdb.d/01-init-postgis.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: redis
    image: redis:7.4-alpine
    restart: unless-stopped
    command: >
      sh -c "redis-server --appendonly yes
      --save 60 1
      --requirepass ${REDIS_PASSWORD}"
#    ports:
#      - "${REDIS_PORT}:${REDIS_PORT}"
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    container_name: adminer
    image: adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - backend

  api:
    container_name: api
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  minio_data:
  postgres_data:
  redis_data:
